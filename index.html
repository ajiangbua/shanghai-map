        };

        // 生成补充数据 (如果上面没有填全，用这个保底)
        districts.forEach(dist => {
            dimensions.forEach(dim => {
                for(let i=0; i<3; i++) {
                    const txt = sampleComments[dim][Math.floor(Math.random()*sampleComments[dim].length)];
                    const score = 3 + Math.random() * 1.5; // 随机3.0-4.5分
                    commentData.push({
                        region: dist,
                        content: `(${dist}区用户反馈) ${txt}... (这是基于数据的模拟展示，实际作业请替换为真实CSV解析内容)`,
                        dimension: dim,
                        score: parseFloat(score.toFixed(1))
                    });
                }
            });
        });

                            zoom: 1.2,
                            label: { show: true, fontSize: 10, color: '#333' },
                            itemStyle: { areaColor: '#f5f5f5', borderColor: '#ccc' },
                            emphasis: { itemStyle: { areaColor: '#40a9ff' } },
                            data: []
                        }]
                    };
                    
                    chart.setOption(option);
                    
                    chart.on('click', params => {
                        if (params.seriesType !== 'map') return;
                        showDetails(params.name);
                    });
                })
                .catch(err => {
                    console.error("地图加载失败:", err);
                    document.getElementById('map').innerHTML = '<div style="padding:50px;text-align:center;color:red">地图资源加载失败，请检查网络连接。</div>';
                });
        }

        function renderButtons() {
            const container = document.getElementById('dim-container');
            container.innerHTML = '';
            dimensions.forEach(dim => {
                const btn = document.createElement('button');
                btn.className = `dim-btn ${dim === currentDim ? 'active' : ''}`;
                btn.innerText = dim;
                btn.onclick = () => {
                    currentDim = dim;
                    document.querySelectorAll('.dim-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateMap(dim);
                    // 刷新当前详情页以显示新维度的评论
                    const currentRegion = document.querySelector('.score-header h3')?.innerText;
                    if(currentRegion) showDetails(currentRegion);
                };
                container.appendChild(btn);
            });
        }

        function updateMap(dim) {
            if (!chart) return;
            const mapData = scoreData.map(d => ({
                name: d.region + '区',
                value: typeof d[dim] === 'number' && !isNaN(d[dim]) ? d[dim] : 0
            }));
            
            chart.setOption({ 
                series: [{ 
                    data: mapData 
                }] 
            });
        }

        function showDetails(regionName) {
            const cleanName = regionName.replace('区', '');
            const scores = scoreData.find(d => d.region === cleanName);
            
            const comments = commentData.filter(d => {
                const regionMatch = (d.region === cleanName || d.region.includes(cleanName) || cleanName.includes(d.region));
                const dimMatch = (d.dimension === currentDim);
                return regionMatch && dimMatch;
            });

            let html = `<div class="score-card">`;
            html += `<div class="score-header">
                <h3 style="margin:0">${regionName}</h3>
                ${scores && scores.avg ? `<span class="avg-badge">平均分：${scores.avg}</span>` : ''}
            </div>`;
            
            html += `<div class="score-grid">`;
            if (scores) {
                dimensions.forEach(d => {
                    const style = d === currentDim ? 'color:#1890ff; font-weight:bold;' : '';
                    const scoreVal = typeof scores[d] === 'number' && !isNaN(scores[d]) ? scores[d] : 'N/A';
                    html += `<div style="${style}">${d} <span class="score-val">${scoreVal}</span></div>`;
                });
            } else {
                html += `<div style="grid-column:span2; color:#999">暂无平均分数据</div>`;
            }
            html += `</div></div>`;
            
            html += `<div style="margin-bottom:10px;"><span class="filter-tip">当前显示：<b>${currentDim}</b> 维度的评论 (${comments.length}条)</span></div>`;

            if (comments.length === 0) {
                html += `<div class="empty">暂无该区在此维度的有效评论</div>`;
            } else {
                comments.forEach(c => {
                    let color = '#1890ff';
                    if (c.score >= 4) color = '#52c41a';
                    else if (c.score <= 2.5) color = '#f5222d';
                    
                    html += `
                        <div class="comment-item">
                            <span class="tag" style="background:${color}20; color:${color}">${c.score}分</span>
                            <div class="text">${c.content}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('detail-view').innerHTML = html;
        }

        window.onresize = () => { if (chart) chart.resize(); };
        
        // 启动
        window.onload = initApp;
    </script>
</body>
</html>
